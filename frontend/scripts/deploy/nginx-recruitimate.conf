# Primary domain — recruitimate.app
server {
    listen 80;
    listen [::]:80;
    server_name recruitimate.app;

    client_max_body_size 25M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name recruitimate.app;

    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/recruitimate.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recruitimate.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Legacy domain — redirect to recruitimate.app
server {
    listen 80;
    listen [::]:80;
    server_name recruitimate.io www.recruitimate.io;

    location /.well-known/acme-challenge/ {
